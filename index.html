 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KolanoImaging</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial', sans-serif;
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px;
      overflow-x: hidden;
      background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
      background-size: 600% 600%;
      animation: backgroundMove 30s ease infinite;
      opacity: 0; /* initial for fade-in */
    }

    @keyframes backgroundMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fade-in animation */
    .fade-in {
      opacity: 0;
      animation: fadeIn 1.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h1 {
      font-size: 3em;
      margin-bottom: 60px;
      letter-spacing: 2px;
      font-weight: bold;
      text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
      max-width: 1200px;
      width: 100%;
    }

    .image-button {
      position: relative;
      display: inline-block;
      cursor: pointer;
      overflow: hidden;
      border-radius: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
      perspective: 1000px;
    }

    .image-button img {
      width: 350px;
      height: 230px;
      object-fit: cover;
      display: block;
      transition: transform 0.8s ease, filter 0.3s;
      will-change: transform;
      border-radius: 15px;
    }

    .image-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #ff0066, #6600ff, #00ffff, #ffcc00);
      background-size: 400% 400%;
      opacity: 0;
      transition: opacity 0.5s;
      border-radius: 15px;
      z-index: 1;
      pointer-events: none;
      animation: gradientMove 15s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .image-button:hover::before {
      opacity: 0.3;
    }

    .image-button:hover {
      transform: scale(1.06);
      box-shadow: 0 25px 50px rgba(255, 255, 255, 0.2);
    }

    .image-button:hover img {
      transform: scale(1.12) translateY(-5px);
      filter: brightness(0.7);
    }

    .button-text {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 1.8em;
      font-weight: bold;
      text-shadow: 3px 3px 10px rgba(0,0,0,0.9);
      pointer-events: none;
      transition: transform 0.3s;
      z-index: 2;
    }

    .image-button:hover .button-text {
      transform: translateX(-50%) translateY(-8px);
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .image-button img { width: 300px; height: 200px; }
      .button-text { font-size: 1.6em; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2em; margin-bottom: 40px; }
      .container { flex-direction: column; gap: 30px; align-items: center; }
      .image-button img { width: 90%; height: auto; }
      .button-text { font-size: 1.4em; }
    }
  </style>
</head>
<body>

  <h1 class="fade-in">KolanoImaging</h1>

  <div class="container fade-in">
    <a href="photography.html" class="image-button">
      <img src="photography-cover.jpg" alt="Photography">
      <span class="button-text">Photography</span>
    </a>
    <a href="music.html" class="image-button">
      <img src="music-cover.jpg" alt="Music">
      <span class="button-text">Music</span>
    </a>
  </div>

  <script>
    // Fade in on page load
    window.addEventListener('load', () => {
      document.body.style.transition = 'opacity 0.8s';
      document.body.style.opacity = '1';
    });

    // Fade out before navigating to another page
    const links = document.querySelectorAll('.image-button');
    links.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        document.body.style.transition = 'opacity 0.8s';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location = href; }, 800);
      });
    });
  </script>

</body>
</html>
